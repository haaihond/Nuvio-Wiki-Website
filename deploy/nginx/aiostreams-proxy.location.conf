# Include this location inside the HTTPS server block for nuvio.wiki.
# The fixed upstream prevents this route from becoming an open proxy.
location = /api/aiostreams/user {
    limit_except POST {
        deny all;
    }

    client_max_body_size 2m;

    proxy_pass https://aiostreamsfortheweebsstable.midnightignite.me/api/v1/user;
    proxy_ssl_server_name on;
    proxy_ssl_name aiostreamsfortheweebsstable.midnightignite.me;

    proxy_set_header Host aiostreamsfortheweebsstable.midnightignite.me;
    proxy_set_header Accept application/json;
    proxy_set_header Content-Type application/json;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 15s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
}
